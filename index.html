<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 문화축제 (Cloudflare Workers)</title>
    <style>
        :root {
            --primary: #0051c3; /* Cloudflare Blue */
            --bg: #f9f9fb;
            --card: #ffffff;
            --text: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 50px; }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary); }

        #festival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }

        .d-day {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .card h2 { font-size: 1.3rem; margin: 0 0 15px 0; padding-right: 60px; line-height: 1.4; }

        .card p { margin: 8px 0; color: #515154; font-size: 0.95rem; }

        .card .info-label { font-weight: 600; color: var(--text); margin-right: 5px; }

        .card .period { margin-top: 20px; font-weight: bold; color: var(--primary); }

        .status { text-align: center; padding: 100px; color: #86868b; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎪 전국 문화축제 일정</h1>
        <p>Cloudflare Workers를 통한 실시간 축제 정보 프록시</p>
    </header>

    <div id="festival-grid">
        <div class="status">축제 정보를 가져오는 중...</div>
    </div>
</div>

<script>
    /**
     * 배포된 Cloudflare Worker URL로 교체하세요.
     * 로컬 테스트 시: http://localhost:8787
     */
    const WORKER_URL = "https://ctf-schedule-proxy.qudgns200.workers.dev"; // 예시 URL

    document.addEventListener('DOMContentLoaded', () => {
        fetchFestivals();
    });

    async function fetchFestivals() {
        try {
            const response = await fetch(WORKER_URL);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            const items = data.response?.body?.items || [];

            // 오늘 기준 0~14일 이내 필터링
            const now = new Date();
            now.setHours(0,0,0,0);
            const twoWeeksLater = new Date(now);
            twoWeeksLater.setDate(now.getDate() + 14);

            const filtered = items.filter(f => {
                if (!f.fstvlStartDate) return false;
                const start = new Date(f.fstvlStartDate);
                return !isNaN(start.getTime()) && start >= now && start <= twoWeeksLater;
            }).sort((a, b) => new Date(a.fstvlStartDate) - new Date(b.fstvlStartDate));

            render(filtered);
        } catch (err) {
            console.error(err);
            document.getElementById('festival-grid').innerHTML = `<div class="status">에러 발생: ${err.message}<br><small>Worker가 실행 중인지 확인하세요.</small></div>`;
        }
    }

    function render(list) {
        const grid = document.getElementById('festival-grid');
        grid.innerHTML = '';

        if (list.length === 0) {
            grid.innerHTML = '<div class="status">해당 기간 내 예정된 축제가 없습니다.</div>';
            return;
        }

        list.forEach(f => {
            const diff = Math.ceil((new Date(f.fstvlStartDate).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            const ddayStr = diff === 0 ? "Today" : `D-${diff}`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="d-day">${ddayStr}</div>
                <h2>${f.fstvlNm}</h2>
                <p><span class="info-label">📍 장소</span> ${f.opar || '정보 없음'}</p>
                <p class="period">📅 ${f.fstvlStartDate} ~ ${f.fstvlEndDate}</p>
            `;
            grid.appendChild(card);
        });
    }
</script>

</body>
</html>
