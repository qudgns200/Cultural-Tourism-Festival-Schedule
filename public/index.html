<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Festival | 대한민국 문화관광축제 스케줄러</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 50%, #4facfe 100%);
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }

        .badge {
            background: linear-gradient(135deg, #ff6b9d, #ffa84c);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero {
            padding: 4rem 5% 2.5rem;
            text-align: center;
            color: #fff;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .hero h1 span {
            background: linear-gradient(135deg, #ffecd2, #ffa84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 600px;
            margin: 0 auto;
        }

        .content-area {
            padding: 2rem 5% 4rem;
        }

        .iframe-wrapper {
            width: 100%;
            height: 800px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .hero { padding: 3rem 5% 1.5rem; }
            .iframe-wrapper { height: 600px; }
            .badge { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-text">K-FESTIVAL</div>
        <div class="badge">Live Schedule</div>
    </header>

    <section class="hero">
        <h1>지금, 대한민국이<br><span>축제</span> 중이다</h1>
        <p>오늘 열리는 축제를 바로 확인하세요.</p>
    </section>

    <main class="content-area">
        <div class="iframe-wrapper">
            <iframe src="/list.html" title="Festival List"></iframe>
        </div>
    </main>
</body>
</html>
