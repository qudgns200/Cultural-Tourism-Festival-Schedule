<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Festival | 대한민국 문화관광축제 스케줄러</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E11D48; /* Crimson Red */
            --secondary: #1E293B; /* Slate Blue/Navy */
            --accent: #F59E0B; /* Amber Gold */
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            color: var(--secondary);
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #fb7185);
            border-radius: 8px;
            transform: rotate(-10deg);
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #be123c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .badge {
            background: var(--secondary);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(30, 41, 59, 0.2);
            transition: transform 0.3s ease;
        }

        .badge:hover {
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            padding: 4rem 5% 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .hero h1 span {
            color: var(--primary);
        }

        .hero p {
            font-size: 1.1rem;
            color: #64748b;
            max-width: 600px;
            margin: 0 auto 2rem;
            font-weight: 400;
        }

        /* Main Content Area */
        .content-area {
            flex-grow: 1;
            padding: 0 5% 4rem;
        }

        .iframe-wrapper {
            width: 100%;
            height: 800px;
            background: var(--glass-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { padding: 3rem 5% 1.5rem; }
            .iframe-wrapper { height: 600px; }
            .badge { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <div class="logo-text">K-FESTIVAL</div>
            </div>
            <div class="badge">Live Schedule</div>
        </header>

        <section class="hero">
            <h1>대한민국을 <span>축제</span>의<br>색으로 물들이다</h1>
            <p>우리나라 구석구석 숨겨진 다채로운 축제 소식을 실시간으로 확인하고 특별한 추억을 계획해보세요.</p>
        </section>

        <main class="content-area">
            <div class="iframe-wrapper">
                <iframe src="/list.html" title="Festival List"></iframe>
            </div>
        </main>
    </div>
</body>
</html>
