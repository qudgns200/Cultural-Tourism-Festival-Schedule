<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문화관광축제 스케줄러</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow: hidden;
            background-color: #FBFAF7; /* Variant off-white background */
            color: #1A1A1A;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #ffffff;
            padding: 1rem 2rem;
            border-bottom: 2px solid #1A1A1A; /* Sharp border instead of shadow */
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #E61A6B; /* Variant Pink */
            letter-spacing: -0.025em;
            text-transform: uppercase;
        }
        .badge {
            background-color: #534DAC; /* Variant Blue */
            color: #ffffff;
            padding: 0.4rem 1rem;
            border-radius: 4px; /* Sharp corners */
            font-size: 0.875rem;
            font-weight: 600;
        }
        .iframe-container {
            flex-grow: 1;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">K-Festival</div>
            <div class="badge">WEEKLY SCHEDULE</div>
        </header>
        <div class="iframe-container">
            <iframe src="/list.html" title="Festival List"></iframe>
        </div>
    </div>
</body>
</html>
