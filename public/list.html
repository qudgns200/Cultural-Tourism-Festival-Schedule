<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축제 목록</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: #f8f9fa;
            color: #111827;
        }
        .festival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            border: 1px solid #f3f4f6;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
        }
        .fest-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #1f2937;
            line-height: 1.3;
        }
        .info-row {
            display: flex;
            margin-bottom: 0.5rem;
            font-size: 0.9375rem;
        }
        .label {
            min-width: 90px;
            color: #6b7280;
            font-weight: 500;
        }
        .value {
            color: #374151;
            font-weight: 400;
            word-break: break-all;
        }
        .date-badge {
            display: inline-block;
            background-color: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            margin-right: 0.25rem;
            font-size: 0.875rem;
            color: #4b5563;
        }
        .card-footer {
            padding: 1rem 1.5rem;
            background-color: #f9fafb;
            border-top: 1px solid #f3f4f6;
        }
        .home-link {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 0.625rem;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .home-link:hover {
            background-color: #4338ca;
        }
        .home-link.disabled {
            background-color: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }
        /* 로딩 애니메이션 */
        .loader {
            text-align: center;
            padding: 5rem;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loader">
        <div class="spinner"></div>
        <p>전국 축제 정보를 불러오는 중입니다...</p>
    </div>
    
    <div id="festival-list" class="festival-grid" style="display: none;"></div>

    <script>
        async function loadFestivals() {
            try {
                const response = await fetch('/api/festivals');
                const data = await response.json();
                renderFestivals(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('loading').innerHTML = '<p style="color:red">데이터를 불러오는 데 실패했습니다.</p>';
            }
        }

        function renderFestivals(festivals) {
            const listElement = document.getElementById('festival-list');
            const loadingElement = document.getElementById('loading');
            
            if (festivals.length === 0) {
                loadingElement.innerHTML = '<p>향후 7일간 예정된 축제가 없습니다.</p>';
                return;
            }

            loadingElement.style.display = 'none';
            listElement.style.display = 'grid';

            festivals.forEach(fest => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const hasUrl = fest.homepageUrl && fest.homepageUrl !== 'null' && fest.homepageUrl !== '';
                const urlBtn = hasUrl 
                    ? `<a href="${fest.homepageUrl}" target="_blank" class="home-link">홈페이지 방문</a>`
                    : `<span class="home-link disabled">홈페이지 정보 없음</span>`;

                card.innerHTML = `
                    <div class="card-body">
                        <div class="fest-title">${fest.fstvlNm}</div>
                        <div class="info-row">
                            <span class="label">개최장소</span>
                            <span class="value">${fest.opar || '정보 없음'}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">축제기간</span>
                            <span class="value">
                                <span class="date-badge">${fest.fstvlStartDate}</span> ~ 
                                <span class="date-badge">${fest.fstvlEndDate}</span>
                            </span>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${urlBtn}
                    </div>
                `;
                listElement.appendChild(card);
            });
        }

        window.onload = loadFestivals;
    </script>
</body>
</html>
