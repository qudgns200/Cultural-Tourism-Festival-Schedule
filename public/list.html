<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축제 목록</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: #FBFAF7; /* Variant off-white */
            color: #1A1A1A;
            line-height: 1.6;
        }
        .festival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            border-radius: 4px; /* Slightly rounded, but almost sharp */
            border: 2px solid #1A1A1A; /* Sharp high contrast border */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 6px 6px 0px 0px #1A1A1A; /* Blocky shadow */
        }
        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
        }
        .fest-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #1A1A1A;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }
        .info-row {
            display: flex;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .label {
            min-width: 80px;
            color: #666666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .value {
            color: #1A1A1A;
            font-weight: 500;
        }
        .date-badge {
            display: inline-block;
            background-color: #EDE8D7;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #1A1A1A;
            font-weight: 600;
        }
        .card-footer {
            padding: 1rem 1.5rem;
            background-color: #ffffff;
            border-top: 1px solid #1A1A1A;
        }
        .home-link {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 0.8rem;
            background-color: #E61A6B; /* Variant Pink */
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .home-link:hover {
            background-color: #534DAC; /* Hover to Variant Blue */
        }
        .home-link.disabled {
            background-color: #EDE8D7;
            color: #999999;
            cursor: not-allowed;
        }
        /* 로딩 애니메이션 */
        .loader {
            text-align: center;
            padding: 8rem 2rem;
        }
        .spinner {
            border: 4px solid #EDE8D7;
            border-top: 4px solid #E61A6B;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loader">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: #534DAC;">FESTIVALS LOADING...</p>
    </div>
    
    <div id="festival-list" class="festival-grid" style="display: none;"></div>

    <script>
        async function loadFestivals() {
            try {
                const response = await fetch('/api/festivals');
                const data = await response.json();
                renderFestivals(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('loading').innerHTML = '<p style="color:red">데이터를 불러오는 데 실패했습니다.</p>';
            }
        }

        function renderFestivals(festivals) {
            const listElement = document.getElementById('festival-list');
            const loadingElement = document.getElementById('loading');
            
            if (festivals.length === 0) {
                loadingElement.innerHTML = '<p>향후 7일간 예정된 축제가 없습니다.</p>';
                return;
            }

            loadingElement.style.display = 'none';
            listElement.style.display = 'grid';

            festivals.forEach(fest => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const hasUrl = fest.homepageUrl && fest.homepageUrl !== 'null' && fest.homepageUrl !== '';
                const urlBtn = hasUrl 
                    ? `<a href="${fest.homepageUrl}" target="_blank" class="home-link">홈페이지 방문</a>`
                    : `<span class="home-link disabled">홈페이지 정보 없음</span>`;

                card.innerHTML = `
                    <div class="card-body">
                        <div class="fest-title">${fest.fstvlNm}</div>
                        <div class="info-row">
                            <span class="label">개최장소</span>
                            <span class="value">${fest.opar || '정보 없음'}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">축제기간</span>
                            <span class="value">
                                <span class="date-badge">${fest.fstvlStartDate}</span> ~ 
                                <span class="date-badge">${fest.fstvlEndDate}</span>
                            </span>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${urlBtn}
                    </div>
                `;
                listElement.appendChild(card);
            });
        }

        window.onload = loadFestivals;
    </script>
</body>
</html>
