<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축제 목록</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E11D48;
            --secondary: #1E293B;
            --accent: #F59E0B;
            --bg-color: transparent;
            --card-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1E293B;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .festival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .festival-grid.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border-color: rgba(225, 29, 72, 0.2);
        }

        .card-body {
            padding: 1.8rem;
            flex-grow: 1;
        }

        .fest-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3.5rem;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            gap: 12px;
        }

        .info-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 2px;
            opacity: 0.6;
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: 500;
        }

        .date-range {
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
        }

        .card-footer {
            padding: 1.2rem 1.8rem 1.8rem;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.8rem;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            gap: 8px;
        }

        .btn-link:hover {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }

        .btn-link.disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Loader */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-text {
            margin-top: 1.5rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <div id="loading" class="loader-container">
        <div class="spinner"></div>
        <p class="loader-text">대한민국 축제 정보를 불러오는 중...</p>
    </div>
    
    <div id="festival-list" class="festival-grid"></div>

    <script>
        async function loadFestivals() {
            try {
                const response = await fetch('/api/festivals');
                const data = await response.json();
                renderFestivals(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('loading').innerHTML = '<p style="color:var(--primary)">데이터를 불러오는 데 실패했습니다.</p>';
            }
        }

        function renderFestivals(festivals) {
            const listElement = document.getElementById('festival-list');
            const loadingElement = document.getElementById('loading');
            
            if (festivals.length === 0) {
                loadingElement.innerHTML = `
                    <div class="empty-state">
                        <h3>예정된 축제가 없습니다</h3>
                        <p style="color:var(--text-muted)">현재 진행 중이거나 가까운 시일 내에 예정된 축제가 없습니다.</p>
                    </div>
                `;
                return;
            }

            loadingElement.style.display = 'none';
            listElement.classList.add('loaded');

            festivals.forEach((fest, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                const hasUrl = fest.homepageUrl && fest.homepageUrl !== 'null' && fest.homepageUrl !== '';
                const urlBtn = hasUrl 
                    ? `<a href="${fest.homepageUrl}" target="_blank" class="btn-link">홈페이지 방문 <span>&rarr;</span></a>`
                    : `<span class="btn-link disabled">정보 없음</span>`;

                card.innerHTML = `
                    <div class="card-body">
                        <div class="fest-title">${fest.fstvlNm}</div>
                        
                        <div class="info-item">
                            <div class="info-icon">📍</div>
                            <div class="info-content">
                                <span class="info-label">장소</span>
                                <span class="info-value">${fest.opar || '정보 없음'}</span>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">📅</div>
                            <div class="info-content">
                                <span class="info-label">기간</span>
                                <div class="date-range">${fest.fstvlStartDate} ~ ${fest.fstvlEndDate}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${urlBtn}
                    </div>
                `;
                listElement.appendChild(card);
            });
        }

        window.onload = loadFestivals;
    </script>
</body>
</html>
