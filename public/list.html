<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축제 목록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f5576c;
            --purple: #c44dff;
            --text: #1a1a2e;
            --muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            padding: 2rem;
            background: #fafafa;
            color: var(--text);
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        /* 검색 바 */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .search-bar input[type="date"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input[type="date"]:focus {
            border-color: var(--purple);
        }

        .search-bar button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
        }

        .search-bar button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .search-bar { flex-direction: column; }
        }

        /* 그리드 & 카드 */
        .festival-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .festival-grid.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b9d, #c44dff, #4facfe);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(196, 77, 255, 0.15);
        }

        .card-body {
            padding: 1.8rem;
            flex-grow: 1;
        }

        .fest-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--text);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3.2rem;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            gap: 10px;
        }

        .info-icon { flex-shrink: 0; margin-top: 2px; }

        .info-content { display: flex; flex-direction: column; }

        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-value { font-size: 0.9rem; font-weight: 500; }

        .date-range {
            background: linear-gradient(135deg, #fff0f6, #f3e8ff);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
        }

        .card-footer { padding: 0 1.8rem 1.8rem; }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.2s;
            gap: 8px;
        }

        .btn-link:hover { opacity: 0.9; transform: scale(1.02); }

        .btn-link.disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 로딩 & 빈 상태 */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3e8ff;
            border-top: 3px solid var(--purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            margin-top: 1.2rem;
            font-weight: 600;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: #fff;
            border-radius: 20px;
        }

        .empty-state h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="search-bar">
        <input type="date" id="date-picker">
        <button id="search-btn">검색</button>
    </div>

    <div id="loading" class="loader-container">
        <div class="spinner"></div>
        <p class="loader-text">축제를 불러오는 중</p>
    </div>

    <div id="festival-list" class="festival-grid"></div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-picker').value = today;

        document.getElementById('search-btn').addEventListener('click', () => {
            const date = document.getElementById('date-picker').value;
            if (date) loadFestivals(date);
        });

        async function loadFestivals(date = null) {
            const listEl = document.getElementById('festival-list');
            const loadingEl = document.getElementById('loading');

            listEl.innerHTML = '';
            listEl.classList.remove('loaded');
            loadingEl.style.display = 'flex';
            loadingEl.innerHTML = '<div class="spinner"></div><p class="loader-text">축제를 불러오는 중</p>';

            try {
                const url = date ? `/api/festivals?date=${date}` : '/api/festivals';
                const response = await fetch(url);
                const data = await response.json();
                renderFestivals(data, loadingEl, listEl);
            } catch (error) {
                console.error('Fetch error:', error);
                loadingEl.innerHTML = '<p style="color:#f5576c;font-weight:600">데이터 로딩 실패 — 잠시 후 다시 시도해주세요.</p>';
            }
        }

        function renderFestivals(festivals, loadingEl, listEl) {
            if (festivals.length === 0) {
                loadingEl.innerHTML = `
                    <div class="empty-state">
                        <h3>축제가 없어요 🎪</h3>
                        <p>선택한 날짜에 열리는 축제를 찾지 못했어요.</p>
                    </div>
                `;
                return;
            }

            loadingEl.style.display = 'none';
            listEl.classList.add('loaded');

            festivals.forEach((fest, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;

                const hasUrl = fest.homepageUrl && fest.homepageUrl !== 'null' && fest.homepageUrl !== '';
                const urlBtn = hasUrl
                    ? `<a href="${fest.homepageUrl}" target="_blank" class="btn-link">홈페이지 방문 →</a>`
                    : `<span class="btn-link disabled">정보 없음</span>`;

                card.innerHTML = `
                    <div class="card-body">
                        <div class="fest-title">${fest.fstvlNm}</div>
                        <div class="info-item">
                            <span class="info-icon">📍</span>
                            <div class="info-content">
                                <span class="info-label">장소</span>
                                <span class="info-value">${fest.opar || '정보 없음'}</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">📅</span>
                            <div class="info-content">
                                <span class="info-label">기간</span>
                                <div class="date-range">${fest.fstvlStartDate} ~ ${fest.fstvlEndDate}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${urlBtn}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        window.onload = () => loadFestivals();
    </script>
</body>
</html>
