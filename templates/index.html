<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문화관광축제 일정</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .day-section {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .festival-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .festival-item:last-child {
            border-bottom: none;
        }
        .festival-name {
            font-weight: bold;
            color: #e67e22;
        }
        .festival-info {
            font-size: 0.9em;
            color: #7f8c8d;
        }
        .loading {
            text-align: center;
            font-size: 1.2em;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗓️ 문화관광축제 일정 (향후 7일)</h1>
        <div id="content">
            <div class="loading">데이터를 불러오는 중...</div>
        </div>
    </div>

    <script>
        async function fetchFestivals() {
            try {
                const response = await fetch('/api/festivals');
                const data = await response.json();
                renderFestivals(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('content').innerHTML = '데이터를 불러오는 데 실패했습니다.';
            }
        }

        function renderFestivals(data) {
            const content = document.getElementById('content');
            content.innerHTML = '';

            data.forEach((dayData, index) => {
                const daySection = document.createElement('div');
                daySection.className = 'day-section';

                const date = new Date();
                date.setDate(date.getDate() + index);
                const dateStr = date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

                const h2 = document.createElement('h2');
                h2.textContent = dateStr;
                daySection.appendChild(h2);

                const items = dayData.response.body.items;
                if (items && items.length > 0) {
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'festival-item';
                        div.innerHTML = `
                            <div class="festival-name">${item.fstvlNm}</div>
                            <div class="festival-info">
                                📍 ${item.rdnmadr || item.lnmadr || '주소 정보 없음'}<br>
                                🏢 주최: ${item.auspcInsttNm || '정보 없음'}<br>
                                📞 연락처: ${item.phoneNumber || '정보 없음'}
                            </div>
                        `;
                        daySection.appendChild(div);
                    });
                } else {
                    const p = document.createElement('p');
                    p.textContent = '해당 날짜에 시작하는 축제가 없습니다.';
                    daySection.appendChild(p);
                }

                content.appendChild(daySection);
            });
        }

        fetchFestivals();
    </script>
</body>
</html>
