<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문화관광축제 스케줄러</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow: hidden; /* 메인 페이지 스크롤 방지 */
            background-color: #f8f9fa;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #ffffff;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #4f46e5;
            letter-spacing: -0.025em;
        }
        .badge {
            background-color: #e0e7ff;
            color: #4338ca;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .iframe-container {
            flex-grow: 1;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">🇰🇷 K-Festival Finder</div>
            <div class="badge">향후 7일간의 축제</div>
        </header>
        <div class="iframe-container">
            <iframe src="/list" title="Festival List"></iframe>
        </div>
    </div>
</body>
</html>
